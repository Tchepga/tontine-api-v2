version: '3.8'

services:
  tontine-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: tontine-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8080
    volumes:
      - ./logs:/tmp/logs
    networks:
      - tontine-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 60s

networks:
  tontine-network:
    driver: bridge
