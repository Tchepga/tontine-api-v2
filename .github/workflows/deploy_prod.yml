name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Setup Sentry
        run: |
          echo "📊 Configuration de Sentry..."
          if [ -n "${{ secrets.SENTRY_AUTH_TOKEN }}" ] && [ -n "${{ secrets.SENTRY_ORG }}" ] && [ -n "${{ secrets.SENTRY_PROJECT }}" ]; then
            echo "✅ Variables Sentry configurées"
            echo "SENTRY_ORG=${{ secrets.SENTRY_ORG }}"
            echo "SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}"
          else
            echo "⚠️  Variables Sentry manquantes - Sentry ne fonctionnera pas en production"
          fi

      - name: Deploy to server with Sentry
        run: |
          # Configuration SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST_VPS_HOSTINGER }} >> ~/.ssh/known_hosts
          
          # Créer un tar.gz avec tous les fichiers nécessaires
          echo "📦 Création de l'archive de déploiement..."
          tar -czf deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='upload' \
            --exclude='test' \
            --exclude='docs' \
            --exclude='google-cloud-sdk' \
            --exclude='deploy.tar.gz' \
            --exclude='coverage' \
            scripts/deploy/start-sentry.sh \
            scripts/deploy/deploy-sentry.sh \
            .sentryclirc \
            scripts/deploy/tontine-api.service \
            caddy/ \
            dist/ \
            tsconfig.json \
            tsconfig.build.json \
            nest-cli.json \
          
          # TRANSFERT UNIQUE de l'archive
          echo "📤 Transfert de l'archive..."
          scp -i ~/.ssh/deploy_key deploy.tar.gz ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/tmp/
          
          # Déploiement complet sur le serveur
          echo "🚀 Déploiement sur le serveur..."
          ssh -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "
            set -e
            echo \"🔗 Connexion SSH réussie\"
            
            # Préparer le répertoire de déploiement avec rollback
            cd /root/apps
            rm -rf tontine.old
            mv tontine tontine.old 2>/dev/null || true
            mkdir -p tontine
            cd tontine
            
            # Extraire l'archive
            echo \"📦 Extraction de l'archive...\"
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz
            
            # Nettoyer les dossiers inutiles (seulement src/, node_modules/ est maintenant dans dist/)
            echo \"🧹 Nettoyage des dossiers inutiles...\"
            rm -rf src/ 2>/dev/null || true
            echo \"✅ Dossier src/ supprimé (node_modules/ inclus dans dist/)\"
            
            # Copier le fichier d'environnement
            echo \"🔧 Configuration de l'environnement...\"
            cp /root/config/.env-tontine-api .env
            
            # Configurer Sentry si les variables sont disponibles
            if [ -n \"${{ secrets.SENTRY_DSN }}\" ]; then
              echo \"📊 Configuration de Sentry...\"
              echo \"SENTRY_DSN=${{ secrets.SENTRY_DSN }}\" >> .env
              echo \"SENTRY_ORG=${{ secrets.SENTRY_ORG }}\" >> .env
              echo \"SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}\" >> .env
              echo \"✅ Sentry configuré\"
            else
              echo \"⚠️  Variables Sentry manquantes\"
            fi
            
            # Aucune installation de dépendances - tout est déjà compilé dans dist/
            echo \"✅ Application pré-compilée - aucune installation nécessaire\"
            
            # Créer le répertoire de logs
            mkdir -p logs
            
            # Arrêter l'application existante (simplifié)
            echo \"🔄 Arrêt de l'application existante...\"
            
            # Arrêter le service systemd et les processus Node.js
            systemctl stop tontine-api.service 2>/dev/null || true
            pkill -f \"node dist/main.js\" 2>/dev/null || true
            
            echo \"✅ Arrêt des applications terminé\"
            
            # Installer et configurer le service systemd
            echo \"⚙️  Configuration du service systemd...\"
            cp scripts/deploy/tontine-api.service /etc/systemd/system/
            systemctl daemon-reload
            
            # Démarrer l'application avec le service systemd
            echo \"🚀 Démarrage de l'application avec Sentry...\"
            systemctl enable tontine-api.service || echo \"Service déjà activé\"
            systemctl start tontine-api.service || echo \"Erreur au démarrage du service\"
            
            # Vérification du déploiement
            echo \"✅ Vérification du déploiement...\"
            sleep 10
            
                        # Vérifier que l'application fonctionne (simplifié)
            echo \"✅ Vérification du déploiement...\"
            
            # Attendre que l'application démarre
            sleep 5
            
            # Test simple de connectivité
            if curl -f -s --connect-timeout 10 http://localhost:8080/health > /dev/null 2>&1; then
              echo \"🎉 Déploiement réussi !\"
              echo \"📋 Statut du service:\"
              systemctl status tontine-api.service --no-pager -l
              
              # Nettoyer l'ancienne version
              rm -rf /root/apps/tontine.old
              echo \"✅ Ancienne version nettoyée\"
            else
              echo \"❌ Erreur lors du déploiement\"
              echo \"📋 Logs d'erreur:\"
              journalctl -u tontine-api.service --no-pager -n 50
              
              # Restaurer l'ancienne version
              echo \"🔄 Restauration de l'ancienne version...\"
              systemctl stop tontine-api.service || true
              cd /root/apps
              rm -rf tontine
              mv tontine.old tontine
              cd tontine
              
              # Nettoyer les dossiers inutiles dans la version restaurée
              echo \"🧹 Nettoyage des dossiers inutiles dans la version restaurée...\"
              rm -rf src/ 2>/dev/null || true
              
              exit 1
            fi
            
            echo \"🌐 Application accessible sur le port 8080\"
          "
                  
          # Vérification finale de l'application
          echo "🔍 Vérification finale de l'application..."
          sleep 10
          
          # Test de connectivité directe sur le serveur
          if curl -f -s --connect-timeout 15 http://${{ secrets.HOST_VPS_HOSTINGER }}:8080/health > /dev/null 2>&1; then
            echo "✅ Application accessible sur le port 8080"
            echo "🎉 Déploiement réussi !"
          else
            echo "⚠️  Application non accessible sur le port 8080"
            echo "🔧 Vérifiez manuellement: curl http://${{ secrets.HOST_VPS_HOSTINGER }}:8080/health"
            echo "📋 Consultez les logs de l'application sur le serveur pour diagnostiquer"
            echo "💡 Commandes de diagnostic:"
            echo "   ssh ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}"
            echo "   cd /root/apps/tontine"
            echo "   systemctl status tontine-api.service"
            echo "   journalctl -u tontine-api.service -f"
            echo "   curl -v http://localhost:8080/health"
          fi
          