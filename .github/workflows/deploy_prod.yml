name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create production environment file
        run: |
          cat > src/shared/environement.prod.ts << 'EOF'
          export const environment = {
            production: true,
            jwtConfig: {
              secret: 'tontinard_2.0',
              expiresIn: '24h',
              global: true,
            },
            databaseConfig: {
              type: 'mysql',
              host: '127.0.0.1',
              port: 3306,
              username: 'user',
              password: 'changeme',
              database: 'tontine',
              synchronize:true,
              autoLoadEntities: true,
            },
            passwordConfig: {
              minLength: 8,
              maxLength: 100,
              defaultPassword: 'changeme1@',
            },
          };
          EOF

      - name: Build project
        run: npm run build:prod

      - name: Create SSH key file
        run: |
          # Vérifier que les secrets requis sont définis
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ ERREUR: SERVER_SSH_KEY n'est pas définie dans les secrets GitHub"
            exit 1
          fi
          
          if [ -z "${{ secrets.HOST }}" ]; then
            echo "❌ ERREUR: HOST n'est pas défini dans les secrets GitHub"
            exit 1
          fi
          
          if [ -z "${{ secrets.USER }}" ]; then
            echo "❌ ERREUR: USER n'est pas défini dans les secrets GitHub"
            exit 1
          fi
          
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
          
          # Debug SSH key (sans afficher le contenu complet)
          echo "SSH key file created:"
          ls -la ~/.ssh/deploy_key
          echo "SSH key exists: $([ -s ~/.ssh/deploy_key ] && echo 'YES' || echo 'NO')"
          echo "SSH key size: $(wc -c < ~/.ssh/deploy_key) bytes"
          echo "Connection details: ${{ secrets.USER }}@${{ secrets.HOST }}"

      - name: Run server command via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cp config/.env-tontine-api apps/tontine/.env
            cd /apps/tontine
            npm install --production || true
            nohup node dist/main.js &
