name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create production environment file
        run: |
          cat > src/shared/environement.prod.ts << 'EOF'
          export const environment = {
            production: true,
            jwtConfig: {
              secret: '${{ secrets.JWT_SECRET }}',
              expiresIn: '${{ secrets.JWT_EXPIRES_IN }}',
              global: true,
            },
            databaseConfig: {
              type: '${{ secrets.DB_TYPE }}',
              host: '${{ secrets.DB_HOST }}',
              port: 3306,
              username: '${{ secrets.DB_USERNAME }}',
              password: '${{ secrets.DB_PASSWORD }}',
              database: '${{ secrets.DB_DATABASE }}',
              synchronize:true,
              autoLoadEntities: true,
            },
            passwordConfig: {
              minLength: 8,
              maxLength: 100,
              defaultPassword: 'changeme1@',
            },
          };
          EOF

      - name: Build project
        run: npm run build:prod

      - name: Display environment configuration
        run: |
          echo "=== Environment Configuration ==="
          echo "JWT_SECRET: ${{ secrets.JWT_SECRET != '' ? '***SET***' : '***NOT SET***' }}"
          echo "JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}"
          echo "DB_TYPE: ${{ secrets.DB_TYPE }}"
          echo "DB_HOST: ${{ secrets.DB_HOST }}"
          echo "DB_USERNAME: ${{ secrets.DB_USERNAME }}"
          echo "DB_DATABASE: ${{ secrets.DB_DATABASE }}"
          echo "DB_PASSWORD: ${{ secrets.DB_PASSWORD != '' ? '***SET***' : '***NOT SET***' }}"
          echo "SERVER_HOST: ${{ secrets.SERVER_HOST }}"
          echo "SERVER_USER: ${{ secrets.SERVER_USER }}"
          echo "SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY != '' ? '***SET***' : '***NOT SET***' }}"
          echo "================================"

      - name: Create SSH key file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Clean and Copy files to server
        run: |
          # Clean existing dist files
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "rm -rf /apps/tontine/dist || true"
          # Copy new dist files
          scp -i ~/.ssh/deploy_key -r dist/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/apps/tontine/

      - name: Stop existing process and start new application
        run: |
          # Stop any existing Node.js process
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "pkill -f 'node dist/main.js' || true"
          # Install dependencies and start the new application in background
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "cd /apps/tontine && npm install --production && nohup node dist/main.js > app.log 2>&1 &"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "ls -la /apps/tontine && ps aux | grep node"
