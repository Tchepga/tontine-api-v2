name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build:prod

      - name: Deploy to server
        run: |
          # Configuration SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST_VPS_HOSTINGER }} >> ~/.ssh/known_hosts
          
          # Copier les fichiers build sur le serveur
          echo "�� Copie des fichiers..."
          scp -i ~/.ssh/deploy_key -r dist/* ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/
          
          # Une seule connexion SSH pour tout le déploiement
          echo "🚀 Déploiement en cours..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "
            set -e
            echo '🔗 Connexion SSH réussie'
            
            # Charger fnm
            export PATH=\$HOME/.local/share/fnm:\$PATH
            eval \"\$(fnm env --use-on-cd)\"
            fnm use default
            
            echo '�� Installation de PM2...'
            npm install -g pm2 || true
            
            echo '📁 Nettoyage et préparation...'
            cd /root/apps/tontine
            rm -rf dist || true
            
            echo '📦 Installation des dépendances...'
            npm install --production
            
            echo '🔄 Arrêt de l\'application existante...'
            pm2 stop tontine-api || true
            pm2 delete tontine-api || true
            
            echo '🚀 Démarrage de l\'application...'
            pm2 start dist/main.js --name tontine-api --log /root/apps/tontine/app.log
            pm2 save
            pm2 startup
            
            echo '✅ Vérification du déploiement...'
            pm2 status
            pm2 logs tontine-api --lines 5
            
            echo '�� Déploiement terminé avec succès !'
          "