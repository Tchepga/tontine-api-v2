name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build:prod

      - name: Setup SSH and deploy
        run: |
          
          # Configuration SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST_VPS_HOSTINGER }} >> ~/.ssh/known_hosts
          
          # Test de connexion SSH
          echo "🔗 Test de connexion SSH..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "echo '✅ Connexion SSH réussie'"
          
          # Nettoyage et copie des fichiers
          echo "📁 Nettoyage et copie des fichiers..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "rm -rf /root/apps/tontine || true"

          # Copier les fichiers build sur le serveur
          scp -i ~/.ssh/deploy_key -r dist/* ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/
          
          # Installation de PM2 si pas déjà installé
          echo "📦 Installation de PM2..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "npm install -g pm2 || true"
          
          # Arrêt du processus existant avec PM2
          echo "🔄 Arrêt de l'application existante..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "pm2 stop tontine-api || true"
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "pm2 delete tontine-api || true"
          
          # Démarrage de l'application
          echo "🚀 Démarrage de l'application avec PM2..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "cd /root/starter && ./start-tontine.sh"
          
          echo "🎉 Déploiement terminé avec succès !"
