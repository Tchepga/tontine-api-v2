name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy to server with Docker
        run: |
          # Configuration SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST_VPS_HOSTINGER }} >> ~/.ssh/known_hosts
          
          # Copier les fichiers Docker sur le serveur
          echo "📁 Copie des fichiers Docker..."
          scp -i ~/.ssh/deploy_key Dockerfile ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/
          scp -i ~/.ssh/deploy_key docker-compose.yml ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/
          scp -i ~/.ssh/deploy_key ecosystem.config.js ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/
          scp -i ~/.ssh/deploy_key start.sh ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/
          scp -i ~/.ssh/deploy_key .dockerignore ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/
          
          # Créer le dossier caddy et copier la configuration
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "mkdir -p /root/apps/tontine/caddy"
          scp -i ~/.ssh/deploy_key caddy/Caddyfile ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/caddy/
          
          # Copier le code source
          echo "📦 Copie du code source..."
          scp -i ~/.ssh/deploy_key -r . ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/
          
          # Copier le fichier de configuration d'environnement
          echo "🔧 Copie du fichier de configuration..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "
            cp /root/config/.env-tontine-api /root/apps/tontine/.env
            echo \"✅ Fichier .env copié avec succès\"
          "
          
          # Déploiement Docker sur le serveur
          echo "🚀 Déploiement Docker en cours..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "
            set -e
            echo \"🔗 Connexion SSH réussie\"
            
            cd /root/apps/tontine
            
            # Vérifier et installer docker-compose si nécessaire
            if ! command -v docker-compose &> /dev/null; then
              echo \"📦 Installation de docker-compose...\"
              sudo curl -L \"https://github.com/docker/compose/releases/latest/download/docker-compose-\$(uname -s)-\$(uname -m)\" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              echo \"✅ docker-compose installé\"
            fi
            
            # Arrêter et supprimer les conteneurs existants
            echo \"🔄 Arrêt des conteneurs existants...\"
            docker-compose down || true
            docker system prune -f || true
            
            # Construire et démarrer les conteneurs
            echo \"🏗️  Construction de l'image Docker...\"
            docker-compose build --no-cache
            
            echo \"🚀 Démarrage des conteneurs...\"
            docker-compose up -d
            
            # Vérification du déploiement
            echo \"✅ Vérification du déploiement...\"
            sleep 10
            
            # Vérifier que le conteneur fonctionne
            if docker-compose ps | grep -q 'Up'; then
              echo \"🎉 Déploiement réussi !\"
              docker-compose ps
              docker-compose logs --tail=10 tontine-api
            else
              echo \"❌ Erreur lors du déploiement\"
              docker-compose logs tontine-api
              exit 1
            fi
            
            echo \"🌐 Application accessible sur le port 8080\"
          "
          
          # Configuration Caddy pour le domaine
          echo "🌐 Configuration Caddy pour le domaine..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "
            echo \"🔧 Configuration Caddy en cours...\"
            
            # Vérifier si un processus Caddy existe déjà pour ce domaine
            if pgrep -f 'caddy.*api.tontine.devcoorp.net' > /dev/null; then
              echo \"🔄 Mise à jour de la configuration Caddy existante...\"
              # Arrêter seulement le processus pour ce domaine spécifique
              pkill -f 'caddy.*api.tontine.devcoorp.net' || echo \"Aucun processus spécifique à arrêter\"
              sleep 2
            else
              echo \"🚀 Démarrage d'un nouveau processus Caddy...\"
            fi
            
            # Démarrer Caddy reverse-proxy pour le domaine (avec gestion d'erreur)
            if nohup caddy reverse-proxy --from api.tontine.devcoorp.net --to localhost:8080 > /dev/null 2>&1 & then
              CADDY_PID=\$!
              echo \"✅ Caddy reverse-proxy démarré (PID: \$CADDY_PID)\"
            else
              echo \"❌ Erreur lors du démarrage de Caddy\"
              exit 1
            fi
            
            # Vérification finale
            sleep 3
            if ps -p \$CADDY_PID > /dev/null; then
              echo \"✅ Caddy reverse-proxy démarré avec succès (PID: \$CADDY_PID)\"
              echo \"📋 Processus Caddy actifs:\"
              ps aux | grep caddy | grep -v grep
            else
              echo \"❌ Erreur lors du démarrage de Caddy\"
              exit 1
            fi
            
            echo \"🎉 Configuration Caddy terminée !\"
            echo \"🌐 Application accessible sur https://api.tontine.devcoorp.net\"
          "
          