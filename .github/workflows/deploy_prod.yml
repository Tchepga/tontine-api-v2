name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build:prod

      - name: Debug secrets
        run: |
          echo "=== Debug des secrets ==="
          echo "Tous les secrets disponibles:"
          env | grep -i secret || echo "Aucun secret trouvé"
          echo ""
          echo "Vérification spécifique:"
          echo "SSH_KEY_VPS_HOSTINGER existe: ${{ secrets.SSH_KEY_VPS_HOSTINGER != '' && 'OUI' || 'NON' }}"
          echo "HOST_VPS_HOSTINGER existe: ${{ secrets.HOST_VPS_HOSTINGER != '' && 'OUI' || 'NON' }}"
          echo "HOST_VPS_USER existe: ${{ secrets.HOST_VPS_USER != '' && 'OUI' || 'NON' }}"
          echo "================================"

      - name: Create SSH key file
        run: |
          # Vérifier que les secrets requis sont définis
          echo "=== Vérification des secrets ==="
          echo "SSH_KEY_VPS_HOSTINGER: ${{ secrets.SSH_KEY_VPS_HOSTINGER != '' && '***SET***' || '***NOT SET***' }}"
          echo "HOST_VPS_HOSTINGER: ${{ secrets.HOST_VPS_HOSTINGER != '' && secrets.HOST_VPS_HOSTINGER || '***NOT SET***' }}"
          echo "HOST_VPS_USER: ${{ secrets.HOST_VPS_USER != '' && secrets.HOST_VPS_USER || '***NOT SET***' }}"
          echo "================================"
          
          if [ -z "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" ]; then
            echo "❌ ERREUR: SSH_KEY_VPS_HOSTINGER n'est pas définie dans les secrets GitHub"
            echo "Vérifiez que le secret existe dans Settings > Secrets and variables > Actions"
            exit 1
          fi
          
          if [ -z "${{ secrets.HOST_VPS_HOSTINGER }}" ]; then
            echo "❌ ERREUR: HOST_VPS_HOSTINGER n'est pas défini dans les secrets GitHub"
            exit 1
          fi
          
          if [ -z "${{ secrets.HOST_VPS_USER }}" ]; then
            echo "❌ ERREUR: HOST_VPS_USER n'est pas défini dans les secrets GitHub"
            exit 1
          fi
          
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST_VPS_HOSTINGER }} >> ~/.ssh/known_hosts
          
          # Vérifier le format de la clé SSH
          echo "Vérification du format de la clé SSH:"
          if head -1 ~/.ssh/deploy_key | grep -q "-----BEGIN"; then
            echo "✅ Format de clé SSH correct"
          else
            echo "❌ Format de clé SSH incorrect - doit commencer par '-----BEGIN'"
            echo "Première ligne: $(head -1 ~/.ssh/deploy_key)"
            exit 1
          fi
          
          # Debug SSH key (sans afficher le contenu complet)
          echo "SSH key file created:"
          ls -la ~/.ssh/deploy_key
          echo "SSH key exists: $([ -s ~/.ssh/deploy_key ] && echo 'YES' || echo 'NO')"
          echo "SSH key size: $(wc -c < ~/.ssh/deploy_key) bytes"
          echo "Connection details: ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}"

      - name: Test SSH connection
        run: |
          echo "Testing SSH connection..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "echo 'SSH connection successful'"

      - name: Clean and Copy files to server
        run: |
          # Clean existing dist files
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "rm -rf /root/apps/tontine/dist || true"
          # Copy new dist files
          scp -i ~/.ssh/deploy_key -r dist/* ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/

      - name: Stop existing process and start new application
        run: |
          # Check if Node.js process is running
          if ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "pgrep -f 'node dist/main.js'"; then
            # Stop any existing Node.js process
            ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "pkill -f 'node dist/main.js'"
          fi
          # Install dependencies and start the new application in background
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "cd /root/apps/tontine && npm install --production && nohup node dist/main.js > app.log 2>&1 &"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "ls -la /root/apps/tontine && ps aux | grep node"
