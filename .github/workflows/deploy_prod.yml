name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create production environment file
        run: |
          cat > src/shared/environement.prod.ts << 'EOF'
          export const environment = {
            production: true,
            jwtConfig: {
              secret: '${{ secrets.JWT_SECRET }}',
              expiresIn: '${{ secrets.JWT_EXPIRES_IN }}',
              global: true,
            },
            databaseConfig: {
              type: '${{ secrets.DB_TYPE }}',
              host: '${{ secrets.DB_HOST }}',
              port: 3306,
              username: '${{ secrets.DB_USERNAME }}',
              password: '${{ secrets.DB_PASSWORD }}',
              database: '${{ secrets.DB_DATABASE }}',
              synchronize:true,
              autoLoadEntities: true,
            },
            passwordConfig: {
              minLength: 8,
              maxLength: 100,
              defaultPassword: 'changeme1@',
            },
          };
          EOF

      - name: Build project
        run: npm run build:prod

      - name: Copy files to server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: 'dist/*'
          target: '/apps/tontine'

      - name: Run server command via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /apps/tontine
            npm install --production || true
            nohup node dist/main.js &
