name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build:prod

      - name: Setup SSH and deploy
        run: |
          # Validation des secrets requis
          if [ -z "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" ]; then
            echo "❌ ERREUR: SSH_KEY_VPS_HOSTINGER n'est pas définie"
            exit 1
          fi
          
          if [ -z "${{ secrets.HOST_VPS_HOSTINGER }}" ]; then
            echo "❌ ERREUR: HOST_VPS_HOSTINGER n'est pas défini"
            exit 1
          fi
          
          if [ -z "${{ secrets.HOST_VPS_USER }}" ]; then
            echo "❌ ERREUR: HOST_VPS_USER n'est pas défini"
            exit 1
          fi
          
          # Configuration SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST_VPS_HOSTINGER }} >> ~/.ssh/known_hosts
          
          # Test de connexion SSH
          echo "🔗 Test de connexion SSH..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "echo '✅ Connexion SSH réussie'"
          
          # Nettoyage et copie des fichiers
          echo "�� Nettoyage et copie des fichiers..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "rm -rf /root/apps/tontine || true"
          scp -i ~/.ssh/deploy_key -r dist/* ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/root/apps/tontine/
          
          # Installation et configuration PM2
          echo "🔧 Installation et configuration PM2..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "
            cd /root/apps/tontine &&
            npm install --production &&
            npm install -g pm2 &&
            pm2 delete tontine-api || true &&
            pm2 start dist/main.js --name tontine-api --max-memory-restart 300M &&
            pm2 save &&
            pm2 startup
          "
          
          # Vérification du déploiement
          echo "✅ Vérification du déploiement..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "
            echo '=== PM2 Status ===' &&
            pm2 status &&
            echo '=== Application Logs ===' &&
            pm2 logs tontine-api --lines 10
          "
          
          echo "�� Déploiement terminé avec succès !"