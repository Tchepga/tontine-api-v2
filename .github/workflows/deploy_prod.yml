name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm i --production

      - name: Run linting
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Deploy to server with PM2
        run: |
          # Configuration SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST_VPS_HOSTINGER }} >> ~/.ssh/known_hosts
          
          # Créer un tar.gz avec tous les fichiers nécessaires (UN SEUL TRANSFERT)
          echo "📦 Création de l'archive de déploiement..."
          tar -czf deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='upload' \
            --exclude='test' \
            --exclude='docs' \
            --exclude='google-cloud-sdk' \
            --exclude='deploy.tar.gz' \
            --exclude='coverage' \
            ecosystem.config.js \
            start.sh \
            start-tontine.sh \
            caddy/ \
            src/ \
            dist/ \
            package.json \
            package-lock.json \
            tsconfig.json \
            tsconfig.build.json \
            nest-cli.json \
            .eslintrc.js \
            .prettierrc
          
          # TRANSFERT UNIQUE de l'archive
          echo "📤 Transfert de l'archive..."
          scp -i ~/.ssh/deploy_key deploy.tar.gz ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/tmp/
          
          # Déploiement complet sur le serveur
          echo "🚀 Déploiement sur le serveur..."
          ssh -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "
            set -e
            echo \"🔗 Connexion SSH réussie\"
            
            # Préparer le répertoire de déploiement avec rollback
            cd /root/apps
            rm -rf tontine.old
            mv tontine tontine.old 2>/dev/null || true
            mkdir -p tontine
            cd tontine
            
            # Extraire l'archive
            echo \"📦 Extraction de l'archive...\"
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz
            
            # Copier le fichier d'environnement
            echo \"🔧 Configuration de l'environnement...\"
            cp /root/config/.env-tontine-api .env
            
            # Vérifier et installer Node.js si nécessaire
            if ! command -v node &> /dev/null; then
              echo \"📦 Installation de Node.js...\"
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              apt-get install -y nodejs
              echo \"✅ Node.js installé\"
            fi
            
            # Vérifier et installer PM2 si nécessaire
            if ! command -v pm2 &> /dev/null; then
              echo \"📦 Installation de PM2...\"
              npm install -g pm2
              echo \"✅ PM2 installé\"
            fi
            
            # Installer les dépendances de production
            echo \"📦 Installation des dépendances...\"
            npm ci --only=production
            
            # Arrêter l'application PM2 existante
            echo \"🔄 Arrêt de l'application existante...\"
            pm2 stop tontine-api || echo \"Aucune application à arrêter\"
            pm2 delete tontine-api || echo \"Aucune application à supprimer\"
            
            # Démarrer l'application avec PM2
            echo \"🚀 Démarrage de l'application avec PM2...\"
            pm2 start ecosystem.config.js
            
            # Sauvegarder la configuration PM2
            echo \"💾 Sauvegarde de la configuration PM2...\"
            pm2 save
            
            # Configurer le démarrage automatique
            echo \"⚙️  Configuration du démarrage automatique...\"
            pm2 startup || echo \"Démarrage automatique déjà configuré\"
            
            # Vérification du déploiement
            echo \"✅ Vérification du déploiement...\"
            sleep 10
            
            # Vérifier que l'application fonctionne
            if pm2 list | grep -q 'tontine-api.*online'; then
              echo \"🎉 Déploiement réussi !\"
              pm2 list
              pm2 logs tontine-api --lines 10
              
              # Nettoyer l'ancienne version si tout va bien
              rm -rf /root/apps/tontine.old
            else
              echo \"❌ Erreur lors du déploiement\"
              pm2 logs tontine-api
              
              # Restaurer l'ancienne version en cas d'erreur
              echo \"🔄 Restauration de l'ancienne version...\"
              cd /root/apps
              rm -rf tontine
              mv tontine.old tontine
              cd tontine
              pm2 start ecosystem.config.js || true
              exit 1
            fi
            
            echo \"🌐 Application accessible sur le port 8080\"
          "
          
          # Configuration Caddy optimisée pour multi-applications (mode processus)
          echo "🌐 Configuration Caddy..."
          ssh -i ~/.ssh/deploy_key root@${{ secrets.HOST_VPS_HOSTINGER }} "
            set -e  # Arrêter en cas d'erreur
            echo '🔧 Configuration Caddy en cours...'
            
            # Vérifier si Caddy est installé
            if ! command -v caddy &> /dev/null; then
              echo '📦 Installation de Caddy...'
              apt-get update -qq
              apt-get install -y debian-keyring debian-archive-keyring apt-transport-https curl
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
              curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | tee /etc/apt/sources.list.d/caddy-stable.list
              apt-get update -qq
              apt-get install -y caddy
              echo '✅ Caddy installé'
            fi
            
            # Arrêter UNIQUEMENT le processus Caddy pour tontine-api (avec gestion d'erreur robuste)
            echo '🔄 Arrêt du processus Caddy pour tontine-api...'
            
            # Vérifier d'abord si le processus existe
            if pgrep -f 'caddy.*api.tontine.devcoorp.net' > /dev/null 2>&1; then
              echo '📋 Processus Caddy tontine-api trouvé, arrêt en cours...'
              pkill -f 'caddy.*api.tontine.devcoorp.net' || true
              sleep 3
              
              # Vérifier que le processus est bien arrêté
              if pgrep -f 'caddy.*api.tontine.devcoorp.net' > /dev/null 2>&1; then
                echo '⚠️  Le processus persiste, arrêt forcé...'
                pkill -9 -f 'caddy.*api.tontine.devcoorp.net' || true
                sleep 2
              fi
              echo '✅ Processus Caddy tontine-api arrêté'
            else
              echo 'ℹ️  Aucun processus Caddy pour tontine-api trouvé'
            fi
            
            # Vérifier qu'aucun autre processus Caddy n'est affecté
            echo '📋 Vérification des autres processus Caddy...'
            CADDY_PROCESSES=\$(ps aux | grep caddy | grep -v grep | grep -v 'api.tontine.devcoorp.net' || true)
            if [ -n \"\$CADDY_PROCESSES\" ]; then
              echo '✅ Autres processus Caddy actifs:'
              echo \"\$CADDY_PROCESSES\"
            else
              echo 'ℹ️  Aucun autre processus Caddy détecté'
            fi
            
            # Démarrer Caddy pour tontine-api uniquement
            echo '🚀 Démarrage de Caddy pour tontine-api...'
            nohup caddy reverse-proxy --from api.tontine.devcoorp.net --to localhost:8080 > /tmp/caddy-tontine.log 2>&1 &
            TONTINE_CADDY_PID=\$!
            
            # Vérification du démarrage
            sleep 3
            if ps -p \$TONTINE_CADDY_PID > /dev/null 2>&1; then
              echo '✅ Caddy pour tontine-api démarré avec succès (PID: '\$TONTINE_CADDY_PID')'
              echo '📋 Logs Caddy tontine-api:'
              tail -5 /tmp/caddy-tontine.log 2>/dev/null || echo 'Aucun log disponible'
              
              # Sauvegarder le PID pour référence future
              echo \$TONTINE_CADDY_PID > /tmp/caddy-tontine.pid
              echo '💾 PID sauvegardé dans /tmp/caddy-tontine.pid'
            else
              echo '❌ Erreur lors du démarrage de Caddy pour tontine-api'
              echo '📋 Logs d\'erreur:'
              cat /tmp/caddy-tontine.log 2>/dev/null || echo 'Aucun log disponible'
              exit 1
            fi
            
            echo '🎉 Configuration Caddy pour tontine-api terminée !'
            echo '🌐 Application accessible sur https://api.tontine.devcoorp.net'
            echo '📋 Tous les processus Caddy actifs:'
            ps aux | grep caddy | grep -v grep || echo 'Aucun processus Caddy trouvé'
          " || {
            echo "⚠️  Erreur lors de la configuration Caddy, mais le déploiement continue..."
            echo "🔧 L'application est accessible sur le port 8080"
          }
          