name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create production environment file
        run: |
          cat > src/shared/environement.prod.ts << 'EOF'
          export const environment = {
            production: true,
            jwtConfig: {
              secret: 'tontinard_2.0',
              expiresIn: '24h',
              global: true,
            },
            databaseConfig: {
              type: 'mysql',
              host: '127.0.0.1',
              port: 3306,
              username: 'user',
              password: 'changeme',
              database: 'tontine',
              synchronize:true,
              autoLoadEntities: true,
            },
            passwordConfig: {
              minLength: 8,
              maxLength: 100,
              defaultPassword: 'changeme1@',
            },
          };
          EOF

      - name: Build project
        run: npm run build:prod

      - name: Create SSH key file
        run: |
          # Vérifier que les secrets requis sont définis
          if [ -z "${{ secrets.SSH_DEPLOY_KEY }}" ]; then
            echo "❌ ERREUR: SSH_DEPLOY_KEY n'est pas définie dans les secrets GitHub"
            exit 1
          fi
          
          if [ -z "${{ secrets.HOST }}" ]; then
            echo "❌ ERREUR: HOST n'est pas défini dans les secrets GitHub"
            exit 1
          fi
          
          if [ -z "${{ secrets.USER }}" ]; then
            echo "❌ ERREUR: USER n'est pas défini dans les secrets GitHub"
            exit 1
          fi
          
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
          
          # Debug SSH key (sans afficher le contenu complet)
          echo "SSH key file created:"
          ls -la ~/.ssh/deploy_key
          echo "SSH key exists: $([ -s ~/.ssh/deploy_key ] && echo 'YES' || echo 'NO')"
          echo "SSH key size: $(wc -c < ~/.ssh/deploy_key) bytes"
          echo "Connection details: ${{ secrets.USER }}@${{ secrets.HOST }}"

      - name: Test SSH connection
        run: |
          echo "Testing SSH connection..."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.USER }}@${{ secrets.HOST }} "echo 'SSH connection successful'"

      - name: Clean and Copy files to server
        run: |
          # Clean existing dist files
          ssh -i ~/.ssh/deploy_key ${{ secrets.USER }}@${{ secrets.HOST }} "rm -rf /root/apps/tontine/dist || true"
          # Copy new dist files
          scp -i ~/.ssh/deploy_key -r dist/* ${{ secrets.USER }}@${{ secrets.HOST }}:/root/apps/tontine/

      - name: Stop existing process and start new application
        run: |
          # Check if Node.js process is running
          if ssh -i ~/.ssh/deploy_key ${{ secrets.USER }}@${{ secrets.HOST }} "pgrep -f 'node dist/main.js'"; then
            # Stop any existing Node.js process
            ssh -i ~/.ssh/deploy_key ${{ secrets.USER }}@${{ secrets.HOST }} "pkill -f 'node dist/main.js'"
          fi
          # Install dependencies and start the new application in background
          ssh -i ~/.ssh/deploy_key ${{ secrets.USER }}@${{ secrets.HOST }} "cd /root/apps/tontine && npm install --production && nohup node dist/main.js > app.log 2>&1 &"

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.USER }}@${{ secrets.HOST }} "ls -la /root/apps/tontine && ps aux | grep node"
