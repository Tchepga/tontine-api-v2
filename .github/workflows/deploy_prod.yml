name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Create production environment file
        run: |
          cat > src/shared/environement.prod.ts << 'EOF'
          export const environment = {
            production: true,
            jwtConfig: {
              secret: 'tontinard_2.0',
              expiresIn: '24h',
              global: true,
            },
            databaseConfig: {
              type: 'mysql',
              host: '127.0.0.1',
              port: 3306,
              username: 'user',
              password: 'changeme',
              database: 'tontine',
              synchronize:true,
              autoLoadEntities: true,
            },
            passwordConfig: {
              minLength: 8,
              maxLength: 100,
              defaultPassword: 'changeme1@',
            },
          };
          EOF

      - name: Build project
        run: npm run build:prod

      - name: Display environment configuration
        run: |
          echo "=== Environment Configuration ==="
          echo "JWT_SECRET: ${{ secrets.JWT_SECRET != '' && '***SET***' || '***NOT SET***' }}"
          echo "JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}"
          echo "DB_TYPE: ${{ secrets.DB_TYPE }}"
          echo "DB_HOST: ${{ secrets.DB_HOST }}"
          echo "DB_USERNAME: ${{ secrets.DB_USERNAME }}"
          echo "DB_DATABASE: ${{ secrets.DB_DATABASE }}"
          echo "DB_PASSWORD: ${{ secrets.DB_PASSWORD != '' && '***SET***' || '***NOT SET***' }}"
          echo "SERVER_HOST: ${{ secrets.SERVER_HOST }}"
          echo "SERVER_USER: ${{ secrets.SERVER_USER }}"
          echo "SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY != '' && '***SET***' || '***NOT SET***' }}"
          echo "================================"

      - name: Create SSH key file
