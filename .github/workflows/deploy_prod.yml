name: Deploy to Production

# SSH deploy credentials are read from Repository secrets (Settings → Secrets → Actions):
#   HOST_VPS_HOSTINGER  → IP ou domaine du serveur
#   HOST_VPS_USER       → utilisateur SSH (ex: root ou ubuntu)
#   SSH_KEY_VPS_HOSTINGER → clé privée SSH complète (BEGIN/END inclus)

# Deploy only runs when master moves (direct push or merge of a PR into master).
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify deploy secrets are set
        env:
          HOST_VPS_HOSTINGER: ${{ secrets.HOST_VPS_HOSTINGER }}
          HOST_VPS_USER: ${{ secrets.HOST_VPS_USER }}
          SSH_KEY_VPS_HOSTINGER: ${{ secrets.SSH_KEY_VPS_HOSTINGER }}
        run: |
          ok=0
          [ -n "$HOST_VPS_HOSTINGER" ] || { echo "::error::HOST_VPS_HOSTINGER is missing or empty."; ok=1; }
          [ -n "$HOST_VPS_USER" ] || { echo "::error::HOST_VPS_USER is missing or empty."; ok=1; }
          [ -n "$SSH_KEY_VPS_HOSTINGER" ] || { echo "::error::SSH_KEY_VPS_HOSTINGER is missing or empty (full private key with BEGIN/END lines required)."; ok=1; }
          exit $ok

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build:prod

      - name: Copy files to server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_VPS_HOSTINGER }}
          username: ${{ secrets.HOST_VPS_USER }}
          key: ${{ secrets.SSH_KEY_VPS_HOSTINGER }}
          source: 'dist/*'
          target: '/apps/tontine'

      - name: Run server command via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST_VPS_HOSTINGER }}
          username: ${{ secrets.HOST_VPS_USER }}
          key: ${{ secrets.SSH_KEY_VPS_HOSTINGER }}
          script: |
            cp config/.env-tontine-api apps/tontine/.env
            cd /apps/tontine
            npm install --production || true
            nohup node dist/main.js &
