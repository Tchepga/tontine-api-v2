name: Deploy to Production

on:
  push:
    branches:
      - deploy
  pull_request:
    branches:
      - deploy
    types: [closed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Deploy to server with PM2
        run: |
          # Configuration SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY_VPS_HOSTINGER }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST_VPS_HOSTINGER }} >> ~/.ssh/known_hosts
          
          # Créer un tar.gz avec tous les fichiers nécessaires (UN SEUL TRANSFERT)
          echo "📦 Création de l'archive de déploiement..."
          tar -czf deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='upload' \
            --exclude='test' \
            --exclude='docs' \
            --exclude='google-cloud-sdk' \
            --exclude='deploy.tar.gz' \
            --exclude='coverage' \
            ecosystem.config.js \
            start.sh \
            start-tontine.sh \
            caddy/ \
            src/ \
            dist/ \
            package.json \
            package-lock.json \
            tsconfig.json \
            tsconfig.build.json \
            nest-cli.json \
            .eslintrc.js \
            .prettierrc
          
          # TRANSFERT UNIQUE de l'archive
          echo "📤 Transfert de l'archive..."
          scp -i ~/.ssh/deploy_key deploy.tar.gz ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }}:/tmp/
          
          # Déploiement complet sur le serveur
          echo "🚀 Déploiement sur le serveur..."
          ssh -o ConnectTimeout=60 -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/deploy_key ${{ secrets.HOST_VPS_USER }}@${{ secrets.HOST_VPS_HOSTINGER }} "
            set -e
            echo \"🔗 Connexion SSH réussie\"
            
            # Préparer le répertoire de déploiement avec rollback
            cd /root/apps
            rm -rf tontine.old
            mv tontine tontine.old 2>/dev/null || true
            mkdir -p tontine
            cd tontine
            
            # Extraire l'archive
            echo \"📦 Extraction de l'archive...\"
            tar -xzf /tmp/deploy.tar.gz
            rm /tmp/deploy.tar.gz
            
            # Copier le fichier d'environnement
            echo \"🔧 Configuration de l'environnement...\"
            cp /root/config/.env-tontine-api .env
            
            # Utiliser uniquement Volta (pas d'installation Node.js)
            NODE_PATH=\"/root/.volta/bin/node\"
            NPM_PATH=\"/root/.volta/bin/npm\"
            PM2_PATH=\"/root/.volta/bin/pm2\"
            
            echo \"✅ Utilisation de Node.js Volta: \$NODE_PATH\"
            echo \"✅ Version Node.js: \$(\$NODE_PATH --version)\"
            echo \"✅ Utilisation de npm: \$NPM_PATH\"
            echo \"✅ Utilisation de PM2: \$PM2_PATH\"
            
            # Vérifier et installer PM2 si nécessaire
            if [ ! -f \"\$PM2_PATH\" ]; then
              echo \"📦 Installation de PM2...\"
              \$NPM_PATH install -g pm2
              echo \"✅ PM2 installé\"
            fi
            
            # Installer les dépendances de production
            echo \"📦 Installation des dépendances...\"
            \$NPM_PATH ci --only=production
            
            # Arrêter l'application PM2 existante
            echo \"🔄 Arrêt de l'application existante...\"
            \$PM2_PATH stop tontine-api || echo \"Aucune application à arrêter\"
            \$PM2_PATH delete tontine-api || echo \"Aucune application à supprimer\"
            
            # Démarrer l'application avec PM2
            echo \"🚀 Démarrage de l'application avec PM2...\"
            \$PM2_PATH start ecosystem.config.js
            
            # Sauvegarder la configuration PM2
            echo \"💾 Sauvegarde de la configuration PM2...\"
            \$PM2_PATH save
            
            # Configurer le démarrage automatique
            echo \"⚙️  Configuration du démarrage automatique...\"
            \$PM2_PATH startup || echo \"Démarrage automatique déjà configuré\"
            
            # Vérification du déploiement
            echo \"✅ Vérification du déploiement...\"
            sleep 5
            
            # Vérifier que l'application fonctionne
            if \$PM2_PATH list | grep -q 'tontine-api.*online'; then
              echo \"🎉 Déploiement réussi !\"
              \$PM2_PATH list
              echo \"📋 Logs récents:\"
              \$PM2_PATH logs tontine-api --lines 5 --nostream
              
              # Nettoyer l'ancienne version si tout va bien
              rm -rf /root/apps/tontine.old
              echo \"✅ Ancienne version nettoyée\"
            else
              echo \"❌ Erreur lors du déploiement\"
              echo \"📋 Logs d'erreur:\"
              \$PM2_PATH logs tontine-api --lines 10 --nostream
              
              # Restaurer l'ancienne version en cas d'erreur
              echo \"🔄 Restauration de l'ancienne version...\"
              cd /root/apps
              rm -rf tontine
              mv tontine.old tontine
              cd tontine
              \$PM2_PATH start ecosystem.config.js || true
              exit 1
            fi
            
            echo \"🌐 Application accessible sur le port 8080\"
          "
          
          # Configuration Caddy avec commandes natives
          echo "🌐 Configuration Caddy..."
          ssh -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -i ~/.ssh/deploy_key root@${{ secrets.HOST_VPS_HOSTINGER }} "
            echo '🔄 Arrêt des processus Caddy existants...'
            pkill -f 'caddy.*reverse-proxy' || echo 'Aucun processus Caddy à arrêter'
            sleep 2
            
            echo '🚀 Démarrage de Caddy pour tontine-api...'
            caddy reverse-proxy --from api.tontine.devcoorp.net --to localhost:8080 &
            CADDY_PID=\$!
            
            echo '✅ Caddy démarré pour tontine-api (PID: '\$CADDY_PID')'
            echo '🌐 Application accessible sur https://api.tontine.devcoorp.net'
            
            # Vérifier que Caddy fonctionne
            sleep 3
            if ps -p \$CADDY_PID > /dev/null 2>&1; then
              echo '✅ Caddy fonctionne correctement'
            else
              echo '⚠️  Caddy ne fonctionne pas, redémarrage...'
              pkill -f 'caddy.*reverse-proxy' || true
              sleep 1
              caddy reverse-proxy --from api.tontine.devcoorp.net --to localhost:8080 &
              echo '✅ Caddy redémarré'
            fi
          " || {
            echo "⚠️  Erreur lors de la configuration Caddy, mais le déploiement continue..."
            echo "🔧 L'application est accessible sur le port 8080"
          }
          
          # Vérification que l'application fonctionne (optionnelle)
          echo "🔍 Vérification de l'application..."
          sleep 5
          
          # Test de connectivité (ne bloque pas le déploiement)
          if curl -f -s --connect-timeout 10 https://api.tontine.devcoorp.net/health > /dev/null 2>&1; then
            echo "✅ Application accessible via HTTPS"
          elif curl -f -s --connect-timeout 10 http://${{ secrets.HOST_VPS_HOSTINGER }}:8080/health > /dev/null 2>&1; then
            echo "✅ Application accessible via HTTP sur le port 8080"
          else
            echo "⚠️  Application non accessible, mais le déploiement continue..."
            echo "🔧 Vérifiez manuellement: curl http://${{ secrets.HOST_VPS_HOSTINGER }}:8080/health"
          fi
          